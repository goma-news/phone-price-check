<!DOCTYPE html>
<html lang="ko">
<head>

    <style>

<body>
    <div class="main-container">
        <h1 class="logo">힙폰</h1>
        <p class="subtitle">오늘의 휴대폰 시세</p>
        <p class="promo-text">카드 발급 및 복잡한 절차 없이<br>간편하게 확인하세요</p>
        <button class="estimate-btn" onclick="startEstimate()">견적 확인하기</button>
        <p class="update-time" id="updateTime">최신 업데이트: 불러오는 중...</p>
        <div class="additional-info">
            <div class="additional-info-title">인터넷 + TV</div>
            <div class="additional-info-desc">사은품 30~최대 100만원 지급</div>
            <a href="http://pf.kakao.com/_Ypsen/chat" target="_blank" class="consult-btn">실시간 상담하기</a>
        </div>
    </div>

    <div id="estimateModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div id="modalBody"></div>
        </div>
    </div>

    <script>
        const SHEET_ID = '1kncTOT0Owvplo-ee6BD-BbUwYU5AC4YDbQ-iY6Wv5Zc';
        const GID = '647819140';

        let phoneData = [];
        let kidsPhoneData = [];
        let currentStep = 1;
        let selectedBrand = '';
        let selectedPhone = '';
        let currentCarrier = '';
        let targetCarrier = '';
        let updateTimeText = '';

        const planInfo = {
            skt: { name: 'SKT 109,000원 요금제', duration: '6개월 유지' },
            kt: { name: 'KT 110,000원 요금제', duration: '6개월 유지' },
            lg: { name: 'LG 115,000원 요금제', duration: '6개월 유지' }
        };

        const additionalServices = {
            skt: { name: '우주패스', price: '9,900원', cancellation: '1개월 후에 해지 가능' },
            kt: { name: '필수팩 지니/밀리', price: '9,900원', cancellation: '3개월 후에 해지 가능' },
            lg: { name: 'V컬러링 음악감상', price: '8,800원', cancellation: '3개월 후에 해지 가능' }
        };

        async function loadData() {
            try {
                const response = await fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${GID}`);
                const csvText = await response.text();
                const result = parseCSVData(csvText);
                phoneData = result.phones;
                kidsPhoneData = parseKidsPhones(csvText);
                updateTimeText = result.updateTime;
                
                document.getElementById('updateTime').textContent = `최신 업데이트: ${updateTimeText}`;
                
                console.log('✅ 데이터 로드 완료:', phoneData.length, '개 제품');
                console.log('✅ 키즈폰 데이터:', kidsPhoneData.length, '개 제품');
                console.log('✅ 업데이트 시간:', updateTimeText);
            } catch (error) {
                console.error('❌ 데이터 로드 실패:', error);
                alert('데이터를 불러오는 데 실패했습니다. 잠시 후 다시 시도해주세요.');
            }
        }

        function parseCSVLine(line) {
            const result = [];
            let current = '';
            let inQuotes = false;
            
            for (let i = 0; i < line.length; i++) {
                const char = line[i];
                if (char === '"') {
                    inQuotes = !inQuotes;
                } else if (char === ',' && !inQuotes) {
                    result.push(current.trim());
                    current = '';
                } else {
                    current += char;
                }
            }
            result.push(current.trim());
            return result;
        }

        function cleanPrice(price) {
            if (!price || price.trim() === '' || price.toString().includes('#REF!')) {
                return '-';
            }
            const trimmed = price.toString().trim();
            if (trimmed === '0' || trimmed === '0.0') {
                return '-';
            }
            const cleaned = trimmed.replace(/[^0-9.\-]/g, '').trim();
            if (cleaned === '' || cleaned === '-' || cleaned === '.') {
                return '-';
            }
            const num = parseFloat(cleaned);
            return isNaN(num) || num === 0 ? '-' : cleaned;
        }

        function cleanRetailPrice(price) {
            if (!price || price.trim() === '' || price.toString().includes('#REF!')) {
                return '0';
            }
            const cleaned = price.toString().replace(/[^0-9]/g, '').trim();
            return cleaned === '' ? '0' : cleaned;
        }

        function parseCSVData(csvText) {
            const lines = csvText.split('\n');
            const smartphones = [];
            let updateTime = '불러오는 중...';

            if (lines.length > 4) {
                const row5 = parseCSVLine(lines[4]);
                if (row5.length > 21 && row5[21]) {
                    updateTime = row5[21].trim();
                }
            }

            for (let i = 9; i < 43; i++) {
                if (i >= lines.length) break;
                
                const cols = parseCSVLine(lines[i]);
                
                if (cols.length < 27) continue;
                
                const name = cols[20]?.trim();
                if (!name || name === '' || name === '모델명') continue;

                const retailPrice = cols[2]?.trim() || '0';

                const phone = {
                    name: name,
                    retailPrice: cleanRetailPrice(retailPrice),
                    skt: {
                        move: cleanPrice(cols[21]),
                        change: cleanPrice(cols[22])
                    },
                    kt: {
                        move: cleanPrice(cols[23]),
                        change: cleanPrice(cols[24])
                    },
                    lg: {
                        move: cleanPrice(cols[25]),
                        change: cleanPrice(cols[26])
                    }
                };

                smartphones.push(phone);
            }

            return { phones: smartphones, updateTime: updateTime };
        }

        function parseKidsPhones(csvText) {
            const lines = csvText.split('\n');
            const kidsPhones = [];

            // SKT (U51, U52)
            for (let i = 50; i <= 51; i++) {
                if (i >= lines.length) break;
                const cols = parseCSVLine(lines[i]);
                if (cols.length < 23) continue;
                const name = cols[20]?.trim();
                if (!name) continue;
                kidsPhones.push({
                    name: name,
                    carrier: 'SKT 통신사',
                    carrierClass: 'carrier-skt',
                    newPrice: cleanPrice(cols[21]),
                    movePrice: cleanPrice(cols[22])
                });
            }

            // KT (U54, U55)
            for (let i = 53; i <= 54; i++) {
                if (i >= lines.length) break;
                const cols = parseCSVLine(lines[i]);
                if (cols.length < 23) continue;
                const name = cols[20]?.trim();
                if (!name) continue;
                kidsPhones.push({
                    name: name,
                    carrier: 'KT 통신사',
                    carrierClass: 'carrier-kt',
                    newPrice: cleanPrice(cols[21]),
                    movePrice: cleanPrice(cols[22])
                });
            }

            // LGU (U58, U59, U60)
            for (let i = 57; i <= 59; i++) {
                if (i >= lines.length) break;
                const cols = parseCSVLine(lines[i]);
                if (cols.length < 23) continue;
                const name = cols[20]?.trim();
                if (!name) continue;
                kidsPhones.push({
                    name: name,
                    carrier: 'LGU+ 통신사',
                    carrierClass: 'carrier-lg',
                    newPrice: cleanPrice(cols[21]),
                    movePrice: cleanPrice(cols[22])
                });
            }

            return kidsPhones;
        }

        function formatPriceToWon(price) {
            if (price === '-' || !price) {
                return '판매중지';
            }
            
            const num = parseFloat(price);
            if (isNaN(num) || num === 0) {
                return '판매중지';
            }
            
            const won = Math.round(num * 10000);
            
            if (won < 0) {
                return '-' + Math.abs(won).toLocaleString() + '원';
            }
            
            return won.toLocaleString() + '원';
        }

        function formatRetailPrice(price) {
            const num = parseInt(price);
            if (isNaN(num) || num === 0) return '';
            return num.toLocaleString() + '원';
        }

        function startEstimate() {
            if (phoneData.length === 0) {
                alert('데이터를 불러오는 중입니다. 잠시만 기다려주세요.');
                return;
            }
            currentStep = 1;
            selectedBrand = '';
            selectedPhone = '';
            currentCarrier = '';
            targetCarrier = '';
            document.getElementById('estimateModal').style.display = 'block';
            showStep1();
        }

        function closeModal() {
            document.getElementById('estimateModal').style.display = 'none';
        }

        function updateProgress() {
            const progress = (currentStep / 5) * 100;
            document.getElementById('progressFill').style.width = progress + '%';
        }

        function showStep1() {
            currentStep = 1;
            updateProgress();
            document.getElementById('modalBody').innerHTML = `
                <div class="step-title">원하시는 휴대폰 브랜드를 선택해주세요</div>
                <div class="option-grid">
                    <button class="option-btn galaxy-brand" onclick="selectBrand('갤럭시')">갤럭시</button>
                    <button class="option-btn" onclick="selectBrand('아이폰')">아이폰</button>
                </div>
                <button class="option-btn" onclick="selectBrand('키즈폰/효도폰')" style="width:100%; margin-top:10px;">키즈폰/효도폰</button>
            `;
        }

        function selectBrand(brand) {
            selectedBrand = brand;
            showStep2();
        }

        function showStep2() {
            currentStep = 2;
            updateProgress();
            
            let phoneListHTML = '';

            if (selectedBrand === '키즈폰/효도폰') {
                phoneListHTML = kidsPhoneData.map(phone => {
                    return `<div class="phone-item" onclick="selectKidsPhone('${phone.name}', '${phone.carrier}')">
                        ${phone.name} <span class="${phone.carrierClass}">(${phone.carrier})</span>
                    </div>`;
                }).join('');
                phoneListHTML += `<a href="http://pf.kakao.com/_Ypsen/chat" class="kids-contact-btn">기기변경은 문의하기</a>`;
            } else {
                let filteredPhones = [];
                if (selectedBrand === '갤럭시') {
                    filteredPhones = phoneData.filter(p => !p.name.includes('아이폰'));
                } else if (selectedBrand === '아이폰') {
                    filteredPhones = phoneData.filter(p => p.name.includes('아이폰'));
                    filteredPhones.sort((a, b) => {
                        const aIs17 = a.name.includes('아이폰17');
                        const bIs17 = b.name.includes('아이폰17');
                        if (aIs17 && !bIs17) return -1;
                        if (!aIs17 && bIs17) return 1;
                        return 0;
                    });
                }

                phoneListHTML = filteredPhones.map(phone => {
                    let colorClass = '';
                    if (phone.name.includes('S26')) {
                        colorClass = 'phone-s26';
                    } else if (phone.name.includes('플립') || phone.name.includes('폴드')) {
                        colorClass = 'phone-flip-fold';
                    } else if (phone.name.includes('S 25') || phone.name.includes('S25')) {
                        colorClass = 'phone-s25';
                    } else if (phone.name.includes('S 24') || phone.name.includes('S24')) {
                        colorClass = 'phone-s24';
                    } else if (phone.name.includes('아이폰17')) {
                        colorClass = 'phone-iphone17';
                    }
                    return `<div class="phone-item ${colorClass}" onclick="selectPhone('${phone.name}')">${phone.name}</div>`;
                }).join('');
            }

            document.getElementById('modalBody').innerHTML = `
                <div class="step-title">기종을 선택해주세요</div>
                <div class="phone-list">
                    ${phoneListHTML}
                </div>
                <div class="btn-group">
                    <button class="btn btn-back" onclick="showStep1()">이전</button>
                </div>
            `;
        }

        function selectPhone(phone) {
            selectedPhone = phone;
            showStep3();
        }

        function selectKidsPhone(phoneName, carrier) {
            const phone = kidsPhoneData.find(p => p.name === phoneName && p.carrier === carrier);
            if (!phone) return;
            showKidsResult(phone);
        }

        function showKidsResult(phone) {
            currentStep = 5;
            updateProgress();

            const newPrice = formatPriceToWon(phone.newPrice);
            const movePrice = formatPriceToWon(phone.movePrice);

            let carrierBadgeClass = 'skt';
            let carrierName = 'SKT';
            if (phone.carrier.includes('KT')) {
                carrierBadgeClass = 'kt';
                carrierName = 'KT';
            } else if (phone.carrier.includes('LGU')) {
                carrierBadgeClass = 'lg';
                carrierName = 'LGU+';
            }

            document.getElementById('modalBody').innerHTML = `
                <div class="result-card">
                    <div class="result-header">
                        <div class="result-phone-name">${phone.name}</div>
                        <div class="result-badges">
                            <span class="result-carrier-badge ${carrierBadgeClass}">${carrierName}</span>
                        </div>
                    </div>
                    <div class="result-details">
                        <div class="result-detail-item">
                            <span class="result-detail-label">신규</span>
                            <span class="result-detail-value">${newPrice}</span>
                        </div>
                        <div class="result-detail-item">
                            <span class="result-detail-label">번호이동</span>
                            <span class="result-detail-value">${movePrice}</span>
                        </div>
                    </div>
                    <a href="http://pf.kakao.com/_Ypsen/chat" target="_blank" class="result-consult-btn">
                        <span>낮은 요금제 · 맞춤 견적</span>
                        <span>카톡 문의하기</span>
                    </a>
                    <div class="result-note">
                        <div class="result-note-item">✓ 기기변경은 카톡 문의 부탁드립니다!</div>
                    </div>
                </div>
                <div class="btn-group" style="margin-top: 15px;">
                    <button class="btn btn-back" onclick="startEstimate()">다시 계산하기</button>
                    <button class="btn btn-next" onclick="closeModal()">닫기</button>
                </div>
            `;
        }

        function showStep3() {
            currentStep = 3;
            updateProgress();
            document.getElementById('modalBody').innerHTML = `
                <div class="step-title">현재 사용 중인 통신사를 선택해주세요</div>
                <div class="option-grid">
                    <button class="option-btn skt-color" onclick="selectCurrentCarrier('skt')">SKT</button>
                    <button class="option-btn kt-color" onclick="selectCurrentCarrier('kt')">KT</button>
                    <button class="option-btn lg-color" onclick="selectCurrentCarrier('lg')">LG U+</button>
                </div>
                <div class="btn-group">
                    <button class="btn btn-back" onclick="showStep2()">이전</button>
                </div>
            `;
        }

        function selectCurrentCarrier(carrier) {
            currentCarrier = carrier;
            showStep4();
        }

        function showStep4() {
            currentStep = 4;
            updateProgress();
            document.getElementById('modalBody').innerHTML = `
                <div class="step-title">이동하실 통신사를 선택해주세요</div>
                <div class="option-grid">
                    <button class="option-btn skt-color" onclick="selectTargetCarrier('skt')">SKT</button>
                    <button class="option-btn kt-color" onclick="selectTargetCarrier('kt')">KT</button>
                    <button class="option-btn lg-color" onclick="selectTargetCarrier('lg')">LG U+</button>
                </div>
                <div class="btn-group">
                    <button class="btn btn-back" onclick="showStep3()">이전</button>
                </div>
            `;
        }

        function selectTargetCarrier(carrier) {
            targetCarrier = carrier;
            showResult();
        }

        function showResult() {
            currentStep = 5;
            updateProgress();

            const phone = phoneData.find(p => p.name === selectedPhone);
            const isMove = currentCarrier !== targetCarrier;
            const priceType = isMove ? 'move' : 'change';
            const price = phone[targetCarrier][priceType];
            const formattedPrice = formatPriceToWon(price);

            if (price === '-' || formattedPrice === '판매중지') {
                document.getElementById('modalBody').innerHTML = `
                    <div class="out-of-stock-section">
                        <div class="out-of-stock-icon">📦</div>
                        <div class="out-of-stock-title">문의하기</div>
                        <div class="out-of-stock-desc">재고 부족으로 실시간 문의가 필요해요</div>
                        <a href="http://pf.kakao.com/_Ypsen/chat" target="_blank" class="result-consult-btn">
                            <span>낮은 요금제 · 맞춤 견적</span>
                            <span>카톡 문의하기</span>
                        </a>
                        <div class="btn-group" style="margin-top: 15px;">
                            <button class="btn btn-back" onclick="startEstimate()">다시 계산하기</button>
                            <button class="btn btn-next" onclick="closeModal()">닫기</button>
                        </div>
                    </div>
                `;
                return;
            }

            const retailPrice = formatRetailPrice(phone.retailPrice);
            const retailPriceNum = parseInt(phone.retailPrice);
            const finalPriceNum = Math.round(parseFloat(price) * 10000);
            const discountPercent = retailPriceNum > 0 && finalPriceNum > 0 
                ? Math.round((1 - (finalPriceNum / retailPriceNum)) * 100) 
                : 0;

            const plan = planInfo[targetCarrier];
            const service = additionalServices[targetCarrier];

            const carrierClass = targetCarrier === 'skt' ? 'skt' : targetCarrier === 'kt' ? 'kt' : 'lg';
            const carrierName = targetCarrier === 'skt' ? 'SKT' : targetCarrier === 'kt' ? 'KT' : 'LG U+';

            document.getElementById('modalBody').innerHTML = `
                <div class="result-card">
                    <div class="result-header">
                        <div class="result-phone-name">${phone.name}</div>
                        <div class="result-badges">
                            <span class="result-carrier-badge ${carrierClass}">${carrierName}</span>
                            <span class="result-type-badge">${isMove ? '번호이동' : '기기변경'}</span>
                        </div>
                    </div>
                    <div class="result-price-section">
                        ${discountPercent > 0 ? `<div class="result-discount-label">최대 ${discountPercent}% 할인</div>` : ''}
                        <div class="result-final-price">${formattedPrice}</div>
                        ${retailPrice ? `<div class="result-original-price">${retailPrice}</div>` : ''}
                    </div>
                    <div class="result-details">
                        <div class="result-detail-item">
                            <span class="result-detail-label">요금제</span>
                            <span class="result-detail-value">${plan.name}<br><small style="font-size:0.85em;opacity:0.8;">(${plan.duration})</small><br><small style="font-size:0.75em;opacity:0.7;">(6개월 후에 요금제 변경 가능)</small></span>
                        </div>
                        <div class="result-detail-item">
                            <span class="result-detail-label">부가 서비스</span>
                            <span class="result-detail-value">${service.name}<br><small style="font-size:0.85em;opacity:0.8;">(${service.price})</small><br><small style="font-size:0.75em;opacity:0.7;">(${service.cancellation})</small></span>
                        </div>
                    </div>
                    <a href="http://pf.kakao.com/_Ypsen/chat" target="_blank" class="result-consult-btn">
                        <span>낮은 요금제 · 맞춤 견적</span>
                        <span>카톡 문의하기</span>
                    </a>
                    <div class="result-note">
                        <div class="result-note-item">✓ 말장난 및 카드발급 조건 없는 투명한 가격입니다!</div>
                        <div class="result-note-item">✓ 선택약정 견적은 카톡 문의하기 부탁드립니다!</div>
                        <div class="result-note-item">✓ 실시간으로 휴대폰 가격이 변동되니 꼭 참고 부탁드립니다!</div>
                    </div>
                </div>
                <div class="btn-group" style="margin-top: 15px;">
                    <button class="btn btn-back" onclick="startEstimate()">다시 계산하기</button>
                    <button class="btn btn-next" onclick="closeModal()">닫기</button>
                </div>
            `;
        }

        window.onclick = function(event) {
            const modal = document.getElementById('estimateModal');
            if (event.target == modal) {
                closeModal();
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadData();
            
            setInterval(() => {
                console.log('🔄 데이터 자동 갱신 중... (' + new Date().toLocaleTimeString() + ')');
                loadData();
            }, 3600000);
        });
    </script>
</body>
</html>
