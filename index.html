<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>힙폰 - 오늘의 휴대폰 시세</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #ffffff;
            color: #333;
            line-height: 1.6;
        }

        .container {
            max-width: 480px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            padding: 30px 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 20px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
        }

        .header h1 {
            font-size: 2em;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .header p {
            font-size: 1em;
            opacity: 0.9;
        }

        .update-time {
            text-align: center;
            color: #666;
            font-size: 0.85em;
            margin-top: 10px;
        }

        .estimate-btn {
            display: block;
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 1.2em;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
            transition: all 0.3s ease;
            margin-bottom: 15px;
        }

        .estimate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 25px rgba(102, 126, 234, 0.5);
        }

        .consult-btn {
            display: block;
            width: 100%;
            padding: 16px;
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
            border-radius: 15px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            text-align: center;
        }

        .consult-btn:hover {
            background: #667eea;
            color: white;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            overflow-y: auto;
        }

        .modal-content {
            background: white;
            max-width: 480px;
            margin: 20px auto;
            border-radius: 20px;
            padding: 30px;
            position: relative;
        }

        .close-btn {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 28px;
            cursor: pointer;
            color: #999;
            background: none;
            border: none;
        }

        .progress-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 30px;
            position: relative;
        }

        .progress-step {
            flex: 1;
            text-align: center;
            position: relative;
        }

        .progress-step::before {
            content: '';
            width: 30px;
            height: 30px;
            background: #e0e0e0;
            border-radius: 50%;
            display: block;
            margin: 0 auto 8px;
            transition: all 0.3s ease;
        }

        .progress-step.active::before {
            background: #667eea;
        }

        .progress-step span {
            font-size: 0.85em;
            color: #999;
        }

        .progress-step.active span {
            color: #667eea;
            font-weight: 600;
        }

        .step-content {
            display: none;
        }

        .step-content.active {
            display: block;
        }

        .step-title {
            font-size: 1.5em;
            font-weight: 700;
            margin-bottom: 20px;
            color: #333;
        }

        .brand-grid, .carrier-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .brand-item, .carrier-item {
            padding: 20px;
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            font-size: 1.1em;
        }

        .brand-item:hover, .carrier-item:hover {
            border-color: #667eea;
            background: #f8f9ff;
            transform: translateY(-2px);
        }

        .brand-item.galaxy {
            color: #0066cc;
        }

        .phone-list {
            max-height: 400px;
            overflow-y: auto;
            margin-bottom: 20px;
        }

        .phone-item {
            padding: 15px;
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .phone-item:hover {
            border-color: #667eea;
            background: #f8f9ff;
            transform: translateX(5px);
        }

        .phone-s26 { color: #0066cc; }
        .phone-flip-fold { color: #764ba2; }
        .phone-s25 { color: #333; }
        .phone-s24 { color: #00aa00; }
        .phone-iphone17 { color: #ff8800; }
        .phone-iphone16 { color: #333; }

        .carrier-skt { color: #ff0000; }

        .result-card {
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
        }

        .result-header {
            text-align: center;
            margin-bottom: 20px;
        }

        .phone-name {
            font-size: 1.5em;
            font-weight: 700;
            margin-bottom: 10px;
            color: #333;
        }

        .badge-container {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 15px;
        }

        .badge {
            padding: 6px 15px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
        }

        .badge-carrier {
            background: #667eea;
            color: white;
        }

        .badge-type {
            background: #f0f0f0;
            color: #666;
        }

        .price-section {
            text-align: center;
            padding: 20px;
            background: white;
            border-radius: 15px;
            margin-bottom: 20px;
        }

        .discount-badge {
            display: inline-block;
            background: #ff4757;
            color: white;
            padding: 8px 20px;
            border-radius: 25px;
            font-size: 1.1em;
            font-weight: 700;
            margin-bottom: 15px;
        }

        .final-price {
            font-size: 2.2em;
            font-weight: 700;
            color: #333;
            margin-bottom: 10px;
        }

        .original-price {
            font-size: 1.1em;
            color: #ff0000;
            text-decoration: line-through;
            margin-bottom: 5px;
        }

        .info-section {
            background: #f8f9ff;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #e0e0e0;
        }

        .info-row:last-child {
            border-bottom: none;
        }

        .info-label {
            color: #666;
            font-weight: 500;
        }

        .info-value {
            font-weight: 600;
            color: #333;
            text-align: right;
        }

        .info-note {
            font-size: 0.85em;
            color: #999;
            margin-top: 5px;
        }

        .note-section {
            background: #fff9e6;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .note-item {
            display: flex;
            align-items: flex-start;
            margin-bottom: 8px;
            font-size: 0.9em;
            color: #666;
            font-weight: 600;
        }

        .note-item:last-child {
            margin-bottom: 0;
        }

        .note-item::before {
            content: '✓';
            color: #667eea;
            font-weight: 700;
            margin-right: 8px;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
        }

        .btn-secondary {
            flex: 1;
            padding: 15px;
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-secondary:hover {
            background: #667eea;
            color: white;
        }

        .btn-primary {
            flex: 1;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            line-height: 1.4;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .kids-contact-btn {
            width: 100%;
            padding: 15px;
            background: #ff4757;
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            text-align: center;
            display: block;
            margin-top: 15px;
        }

        .kids-contact-btn:hover {
            background: #ff3838;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔥 힙폰</h1>
            <p>오늘의 휴대폰 시세</p>
            <p class="update-time" id="updateTime">최신 업데이트: 불러오는 중...</p>
        </div>

        <button class="estimate-btn" onclick="openModal()">📱 견적 확인하기</button>
        <a href="http://pf.kakao.com/_Ypsen/chat" class="consult-btn">💬 카톡 문의하기</a>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <button class="close-btn" onclick="closeModal()">&times;</button>
            
            <div class="progress-bar">
                <div class="progress-step active" id="progress1">
                    <span>브랜드</span>
                </div>
                <div class="progress-step" id="progress2">
                    <span>기종</span>
                </div>
                <div class="progress-step" id="progress3">
                    <span>현재통신사</span>
                </div>
                <div class="progress-step" id="progress4">
                    <span>희망통신사</span>
                </div>
            </div>

            <div id="step1" class="step-content active">
                <h2 class="step-title">브랜드를 선택하세요</h2>
                <div class="brand-grid">
                    <div class="brand-item galaxy" onclick="selectBrand('갤럭시')">갤럭시</div>
                    <div class="brand-item" onclick="selectBrand('아이폰')">아이폰</div>
                </div>
                <div class="brand-item" onclick="selectBrand('키즈폰/효도폰')" style="margin-top: 10px;">키즈폰/효도폰</div>
            </div>

            <div id="step2" class="step-content">
                <h2 class="step-title">기종을 선택하세요</h2>
                <div class="phone-list" id="phoneList"></div>
            </div>

            <div id="step3" class="step-content">
                <h2 class="step-title">현재 통신사를 선택하세요</h2>
                <div class="carrier-grid">
                    <div class="carrier-item" onclick="selectCurrentCarrier('SKT')">SKT</div>
                    <div class="carrier-item" onclick="selectCurrentCarrier('KT')">KT</div>
                    <div class="carrier-item" onclick="selectCurrentCarrier('LG')">LG</div>
                    <div class="carrier-item" onclick="selectCurrentCarrier('알뜰폰')">알뜰폰</div>
                </div>
            </div>

            <div id="step4" class="step-content">
                <h2 class="step-title">희망 통신사를 선택하세요</h2>
                <div class="carrier-grid">
                    <div class="carrier-item" onclick="selectTargetCarrier('SKT')">SKT</div>
                    <div class="carrier-item" onclick="selectTargetCarrier('KT')">KT</div>
                    <div class="carrier-item" onclick="selectTargetCarrier('LG')">LG</div>
                </div>
            </div>

            <div id="result" class="step-content"></div>
        </div>
    </div>

    <script>
        const SHEET_ID = '1kncTOT0Owvplo-ee6BD-BbUwYU5AC4YDbQ-iY6Wv5Zc';
        const GID = '647819140';
        const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${GID}`;

        let phoneData = [];
        let kidsPhoneData = [];
        let updateTime = '';
        let currentStep = 1;
        let selectedBrand = '';
        let selectedPhone = '';
        let currentCarrier = '';
        let targetCarrier = '';

        const planInfo = {
            'SKT': { price: '109,000원', duration: '6개월 유지' },
            'KT': { price: '110,000원', duration: '6개월 유지' },
            'LG': { price: '115,000원', duration: '6개월 유지' }
        };

        const additionalServices = {
            'SKT': { name: '우주패스', price: '9,900원', cancellation: '1개월 후에 해지 가능' },
            'KT': { name: '필수팩 지니/밀리', price: '9,900원', cancellation: '3개월 후에 해지 가능' },
            'LG': { name: 'V컬러링 음악감상', price: '8,800원', cancellation: '3개월 후에 해지 가능' }
        };

        function parseCSVLine(line) {
            const result = [];
            let current = '';
            let inQuotes = false;
            for (let i = 0; i < line.length; i++) {
                const char = line[i];
                if (char === '"') {
                    inQuotes = !inQuotes;
                } else if (char === ',' && !inQuotes) {
                    result.push(current);
                    current = '';
                } else {
                    current += char;
                }
            }
            result.push(current);
            return result;
        }

        function cleanPrice(value) {
            if (!value) return 0;
            const cleaned = value.replace(/[^0-9-]/g, '');
            return parseInt(cleaned) || 0;
        }

        function cleanRetailPrice(value) {
            if (!value) return 0;
            const cleaned = value.replace(/[^0-9]/g, '');
            return parseInt(cleaned) || 0;
        }

        function parseCSVData(csvText) {
            const lines = csvText.split('\n');
            const smartphones = [];
            let updateTimeValue = '불러오는 중...';

            if (lines.length > 4) {
                const row5 = parseCSVLine(lines[4]);
                if (row5.length > 21 && row5[21]) {
                    updateTimeValue = row5[21].trim();
                }
            }

            for (let i = 9; i < 43; i++) {
                if (i >= lines.length) break;
                const cols = parseCSVLine(lines[i]);
                if (cols.length < 27) continue;
                const name = cols[20]?.trim();
                if (!name || name === '' || name === '모델명') continue;
                
                const retailPrice = cols[2]?.trim() || '0';
                const phone = {
                    name: name,
                    retailPrice: cleanRetailPrice(retailPrice),
                    skt: { move: cleanPrice(cols[21]), change: cleanPrice(cols[22]) },
                    kt: { move: cleanPrice(cols[23]), change: cleanPrice(cols[24]) },
                    lg: { move: cleanPrice(cols[25]), change: cleanPrice(cols[26]) }
                };
                smartphones.push(phone);
            }
            
            return { phones: smartphones, updateTime: updateTimeValue };
        }

        function parseKidsPhones(csvText) {
            const lines = csvText.split('\n');
            const kidsPhones = [];

            // SKT (U51:U52 → lines[50], lines[51])
            for (let i = 50; i <= 51; i++) {
                if (i >= lines.length) break;
                const cols = parseCSVLine(lines[i]);
                if (cols.length < 23) continue;
                const name = cols[20]?.trim();
                if (!name) continue;
                kidsPhones.push({
                    name: name,
                    carrier: 'SKT',
                    newPrice: cleanPrice(cols[21]),
                    movePrice: cleanPrice(cols[22])
                });
            }

            // KT (U54:U55 → lines[53], lines[54])
            for (let i = 53; i <= 54; i++) {
                if (i >= lines.length) break;
                const cols = parseCSVLine(lines[i]);
                if (cols.length < 23) continue;
                const name = cols[20]?.trim();
                if (!name) continue;
                kidsPhones.push({
                    name: name,
                    carrier: 'KT',
                    newPrice: cleanPrice(cols[21]),
                    movePrice: cleanPrice(cols[22])
                });
            }

            // LGU (U58:U60 → lines[57], lines[58], lines[59])
            for (let i = 57; i <= 59; i++) {
                if (i >= lines.length) break;
                const cols = parseCSVLine(lines[i]);
                if (cols.length < 23) continue;
                const name = cols[20]?.trim();
                if (!name) continue;
                kidsPhones.push({
                    name: name,
                    carrier: 'LG',
                    newPrice: cleanPrice(cols[21]),
                    movePrice: cleanPrice(cols[22])
                });
            }

            return kidsPhones;
        }

        async function loadData() {
            try {
                const response = await fetch(CSV_URL);
                const csvText = await response.text();
                const parsed = parseCSVData(csvText);
                phoneData = parsed.phones;
                updateTime = parsed.updateTime;
                kidsPhoneData = parseKidsPhones(csvText);
                
                document.getElementById('updateTime').textContent = `최신 업데이트: ${updateTime}`;
            } catch (error) {
                console.error('데이터 로드 실패:', error);
                document.getElementById('updateTime').textContent = '데이터 로드 실패';
            }
        }

        function formatPriceToWon(price) {
            if (price === 0) return '품절';
            const absPrice = Math.abs(price);
            return (price < 0 ? '-' : '') + absPrice.toLocaleString() + '원';
        }

        function openModal() {
            document.getElementById('modal').style.display = 'block';
            resetModal();
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }

        function resetModal() {
            currentStep = 1;
            selectedBrand = '';
            selectedPhone = '';
            currentCarrier = '';
            targetCarrier = '';
            showStep1();
        }

        function updateProgress() {
            for (let i = 1; i <= 4; i++) {
                const step = document.getElementById(`progress${i}`);
                if (i <= currentStep) {
                    step.classList.add('active');
                } else {
                    step.classList.remove('active');
                }
            }
        }

        function showStep1() {
            document.querySelectorAll('.step-content').forEach(el => el.classList.remove('active'));
            document.getElementById('step1').classList.add('active');
            currentStep = 1;
            updateProgress();
        }

        function showStep2() {
            currentStep = 2;
            updateProgress();
            
            document.querySelectorAll('.step-content').forEach(el => el.classList.remove('active'));
            document.getElementById('step2').classList.add('active');

            let phoneListHTML = '';

            if (selectedBrand === '키즈폰/효도폰') {
                phoneListHTML = kidsPhoneData.map(phone => {
                    const carrierClass = phone.carrier === 'SKT' ? 'carrier-skt' : '';
                    return `<div class="phone-item" onclick="selectKidsPhone('${phone.name}', '${phone.carrier}')">
                        ${phone.name} <span class="${carrierClass}">(${phone.carrier})</span>
                    </div>`;
                }).join('');
                phoneListHTML += `<a href="http://pf.kakao.com/_Ypsen/chat" class="kids-contact-btn">기기변경은 문의하기</a>`;
            } else {
                let filteredPhones = [];
                if (selectedBrand === '갤럭시') {
                    filteredPhones = phoneData.filter(p => !p.name.includes('아이폰') && p.name && p.name !== '모델명');
                } else if (selectedBrand === '아이폰') {
                    filteredPhones = phoneData.filter(p => p.name.includes('아이폰'));
                }

                // 정렬
                if (selectedBrand === '갤럭시') {
                    const order = ['S26', 'Z 플립', 'Z 폴드', 'S25', 'S24'];
                    filteredPhones.sort((a, b) => {
                        for (let prefix of order) {
                            const aHas = a.name.includes(prefix);
                            const bHas = b.name.includes(prefix);
                            if (aHas && !bHas) return -1;
                            if (!aHas && bHas) return 1;
                            if (aHas && bHas) {
                                if (prefix === 'S25') {
                                    const aIsFE = a.name.includes('FE');
                                    const bIsFE = b.name.includes('FE');
                                    if (aIsFE && !bIsFE) return 1;
                                    if (!aIsFE && bIsFE) return -1;
                                }
                                return 0;
                            }
                        }
                        return 0;
                    });
                } else if (selectedBrand === '아이폰') {
                    filteredPhones.sort((a, b) => {
                        const aIs17 = a.name.includes('아이폰17');
                        const bIs17 = b.name.includes('아이폰17');
                        if (aIs17 && !bIs17) return -1;
                        if (!aIs17 && bIs17) return 1;
                        return 0;
                    });
                }

                phoneListHTML = filteredPhones.map(phone => {
                    let colorClass = '';
                    if (phone.name.includes('S26')) colorClass = 'phone-s26';
                    else if (phone.name.includes('플립') || phone.name.includes('폴드')) colorClass = 'phone-flip-fold';
                    else if (phone.name.includes('S 25') || phone.name.includes('S25')) colorClass = 'phone-s25';
                    else if (phone.name.includes('S 24') || phone.name.includes('S24')) colorClass = 'phone-s24';
                    else if (phone.name.includes('아이폰17')) colorClass = 'phone-iphone17';
                    else if (phone.name.includes('아이폰16')) colorClass = 'phone-iphone16';
                    
                    return `<div class="phone-item ${colorClass}" onclick="selectPhone('${phone.name}')">${phone.name}</div>`;
                }).join('');
            }

            document.getElementById('phoneList').innerHTML = phoneListHTML;
        }

        function showStep3() {
            currentStep = 3;
            updateProgress();
            document.querySelectorAll('.step-content').forEach(el => el.classList.remove('active'));
            document.getElementById('step3').classList.add('active');
        }

        function showStep4() {
            currentStep = 4;
            updateProgress();
            document.querySelectorAll('.step-content').forEach(el => el.classList.remove('active'));
            document.getElementById('step4').classList.add('active');
        }

        function selectBrand(brand) {
            selectedBrand = brand;
            showStep2();
        }

        function selectPhone(phoneName) {
            selectedPhone = phoneName;
            showStep3();
        }

        function selectKidsPhone(phoneName, carrier) {
            const phone = kidsPhoneData.find(p => p.name === phoneName && p.carrier === carrier);
            if (!phone) return;

            showKidsResult(phone);
        }

        function selectCurrentCarrier(carrier) {
            currentCarrier = carrier;
            showStep4();
        }

        function selectTargetCarrier(carrier) {
            targetCarrier = carrier;
            showResult();
        }

        function showKidsResult(phone) {
            const newPrice = formatPriceToWon(phone.newPrice);
            const movePrice = formatPriceToWon(phone.movePrice);

            const resultHTML = `
                <h2 class="step-title">견적 결과</h2>
                <div class="result-card">
                    <div class="result-header">
                        <div class="phone-name">${phone.name}</div>
                        <div class="badge-container">
                            <span class="badge badge-carrier">${phone.carrier}</span>
                        </div>
                    </div>

                    <div class="info-section">
                        <div class="info-row">
                            <span class="info-label">신규</span>
                            <span class="info-value">${newPrice}</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">번호이동</span>
                            <span class="info-value">${movePrice}</span>
                        </div>
                    </div>

                    <div class="note-section">
                        <div class="note-item">기기변경은 카톡 문의 부탁드립니다!</div>
                    </div>

                    <div class="action-buttons">
                        <button class="btn-secondary" onclick="resetModal()">다시 계산</button>
                        <a href="http://pf.kakao.com/_Ypsen/chat" class="btn-primary">
                            <span>낮은 요금제 · 맞춤 견적</span>
                            <span>카톡 문의하기</span>
                        </a>
                    </div>
                </div>
            `;

            document.getElementById('result').innerHTML = resultHTML;
            document.querySelectorAll('.step-content').forEach(el => el.classList.remove('active'));
            document.getElementById('result').classList.add('active');
        }

        function showResult() {
            const phone = phoneData.find(p => p.name === selectedPhone);
            if (!phone) return;

            const carrierData = phone[targetCarrier.toLowerCase()];
            let price, moveType;

            if (currentCarrier === targetCarrier) {
                price = carrierData.change;
                moveType = '기기변경';
            } else {
                price = carrierData.move;
                moveType = '번호이동';
            }

            const formattedPrice = formatPriceToWon(price);
            const retailPrice = phone.retailPrice;
            const discountPercent = retailPrice > 0 ? Math.round((1 - price / retailPrice) * 100) : 0;

            const plan = planInfo[targetCarrier];
            const service = additionalServices[targetCarrier];

            const resultHTML = `
                <h2 class="step-title">견적 결과</h2>
                <div class="result-card">
                    <div class="result-header">
                        <div class="phone-name">${selectedPhone}</div>
                        <div class="badge-container">
                            <span class="badge badge-carrier">${targetCarrier}</span>
                            <span class="badge badge-type">${moveType}</span>
                        </div>
                    </div>

                    <div class="price-section">
                        <div class="discount-badge">최대 ${discountPercent}% 할인</div>
                        <div class="final-price">${formattedPrice}</div>
                        <div class="original-price">${retailPrice.toLocaleString()}원</div>
                    </div>

                    <div class="info-section">
                        <div class="info-row">
                            <span class="info-label">요금제</span>
                            <div style="text-align: right;">
                                <div class="info-value">${plan.price}</div>
                                <div class="info-note">${plan.duration}</div>
                                <div class="info-note">(6개월 후에 요금제 변경 가능)</div>
                            </div>
                        </div>
                        <div class="info-row">
                            <span class="info-label">부가서비스</span>
                            <div style="text-align: right;">
                                <div class="info-value">${service.name} (${service.price})</div>
                                <div class="info-note">(${service.cancellation})</div>
                            </div>
                        </div>
                    </div>

                    <div class="note-section">
                        <div class="note-item">말장난 및 카드발급 조건 없는 투명한 가격입니다!</div>
                        <div class="note-item">선택약정 견적은 카톡 문의하기 부탁드립니다!</div>
                        <div class="note-item">실시간으로 휴대폰 가격이 변동되니 꼭 참고 부탁드립니다!</div>
                    </div>

                    <div class="action-buttons">
                        <button class="btn-secondary" onclick="resetModal()">다시 계산</button>
                        <a href="http://pf.kakao.com/_Ypsen/chat" class="btn-primary">
                            <span>낮은 요금제 · 맞춤 견적</span>
                            <span>카톡 문의하기</span>
                        </a>
                    </div>
                </div>
            `;

            document.getElementById('result').innerHTML = resultHTML;
            document.querySelectorAll('.step-content').forEach(el => el.classList.remove('active'));
            document.getElementById('result').classList.add('active');
        }

        loadData();
        setInterval(loadData, 3600000);
    </script>
</body>
</html>
