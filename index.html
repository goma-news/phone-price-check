<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>힙폰 - 오늘의 휴대폰 시세</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Apple SD Gothic Neo', sans-serif;
            background: #f8f9fa;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .main-container {
            text-align: center;
            padding: 40px 20px;
        }

        .logo {
            font-size: 3em;
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 20px;
            letter-spacing: -1px;
        }

        .subtitle {
            font-size: 1.3em;
            color: #7f8c8d;
            margin-bottom: 50px;
            font-weight: 400;
        }

        .estimate-btn {
            background: #3498db;
            color: white;
            border: none;
            padding: 18px 60px;
            font-size: 1.2em;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(52, 152, 219, 0.3);
            font-weight: 600;
        }

        .estimate-btn:hover {
            background: #2980b9;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(52, 152, 219, 0.4);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            max-height: 80vh;
            overflow-y: auto;
            position: relative;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        .close-modal {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 28px;
            cursor: pointer;
            color: #95a5a6;
            transition: color 0.3s;
        }

        .close-modal:hover {
            color: #2c3e50;
        }

        .step-title {
            font-size: 1.5em;
            color: #2c3e50;
            margin-bottom: 30px;
            font-weight: 600;
        }

        .option-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }

        .option-btn {
            background: #ecf0f1;
            border: 2px solid transparent;
            padding: 20px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1.1em;
            color: #2c3e50;
            font-weight: 500;
        }

        .option-btn:hover {
            background: #e8f4f8;
            border-color: #3498db;
        }

        .option-btn.selected {
            background: #3498db;
            color: white;
            border-color: #3498db;
        }

        .phone-list {
            max-height: 400px;
            overflow-y: auto;
            margin-bottom: 20px;
        }

        .phone-item {
            background: #ecf0f1;
            border: 2px solid transparent;
            padding: 15px 20px;
            border-radius: 10px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: left;
            font-size: 1em;
        }

        .phone-item:hover {
            background: #e8f4f8;
            border-color: #3498db;
        }

        .phone-item.selected {
            background: #3498db;
            color: white;
            border-color: #3498db;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            justify-content: space-between;
        }

        .btn {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
        }

        .btn-back {
            background: #95a5a6;
            color: white;
        }

        .btn-back:hover {
            background: #7f8c8d;
        }

        .btn-next {
            background: #3498db;
            color: white;
        }

        .btn-next:hover {
            background: #2980b9;
        }

        .result-container {
            text-align: center;
        }

        .result-phone {
            font-size: 1.8em;
            color: #2c3e50;
            margin-bottom: 20px;
            font-weight: 700;
        }

        .result-grid {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #ecf0f1;
        }

        .result-item:last-child {
            border-bottom: none;
        }

        .result-label {
            color: #7f8c8d;
            font-weight: 500;
        }

        .result-value {
            color: #2c3e50;
            font-weight: 600;
            font-size: 1.1em;
        }

        .best-price {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 12px;
            font-size: 1.5em;
            font-weight: 700;
            margin: 20px 0;
        }

        .plan-info {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            text-align: left;
        }

        .plan-info strong {
            color: #856404;
            display: block;
            margin-bottom: 8px;
        }

        .plan-info p {
            color: #856404;
            font-size: 0.95em;
            line-height: 1.5;
        }

        @media (max-width: 768px) {
            .logo {
                font-size: 2em;
            }

            .subtitle {
                font-size: 1.1em;
            }

            .modal-content {
                padding: 30px 20px;
            }

            .option-grid {
                grid-template-columns: 1fr;
            }
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: #ecf0f1;
            border-radius: 2px;
            margin-bottom: 30px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: #3498db;
            transition: width 0.3s;
        }

        .carrier-badge {
            display: inline-block;
            background: #e8f4f8;
            color: #3498db;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.85em;
            margin-left: 8px;
        }
    </style>
</head>
<body>
    <div class="main-container">
        <h1 class="logo">힙폰</h1>
        <p class="subtitle">오늘의 휴대폰 시세</p>
        <button class="estimate-btn" onclick="startEstimate()">견적 확인하기</button>
    </div>

    <div class="modal" id="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <div class="progress-bar">
                <div class="progress-fill" id="progressBar"></div>
            </div>
            <div id="modalBody"></div>
        </div>
    </div>

    <script>
        const SHEET_ID = '1kncTOT0Owvplo-ee6BD-BbUwYU5AC4YDbQ-iY6Wv5Zc';
        const GID = '647819140';
        
        let phoneData = [];
        let currentStep = 1;
        let selectedBrand = '';
        let selectedPhone = '';
        let currentCarrier = '';
        let targetCarrier = '';

        // 통신사별 요금제 정보
        const planInfo = {
            'SKT': { price: '109,000원', duration: '6개월' },
            'KT': { price: '110,000원', duration: '6개월' },
            'LG': { price: '115,000원', duration: '6개월' }
        };

        async function loadData() {
            try {
                const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${GID}`;
                const response = await fetch(url);
                const csvText = await response.text();
                parseCSVData(csvText);
            } catch (error) {
                console.error('데이터 로딩 실패:', error);
            }
        }

        function parseCSVData(csvText) {
            const lines = csvText.split('\n');
            phoneData = [];
            
            for (let i = 8; i < 45; i++) {
                const cols = parseCSVLine(lines[i]);
                const phoneName = cols[20] ? cols[20].trim() : '';
                
                if (!phoneName || phoneName === '' || phoneName === '모델명') {
                    continue;
                }
                
                const phone = {
                    name: phoneName,
                    skt: {
                        move: cleanPrice(cols[21]),
                        change: cleanPrice(cols[22])
                    },
                    kt: {
                        move: cleanPrice(cols[23]),
                        change: cleanPrice(cols[24])
                    },
                    lg: {
                        move: cleanPrice(cols[25]),
                        change: cleanPrice(cols[26])
                    }
                };
                
                phoneData.push(phone);
            }
            
            console.log('데이터 로드 완료:', phoneData.length + '개');
        }

        function parseCSVLine(line) {
            const result = [];
            let current = '';
            let inQuotes = false;
            
            for (let i = 0; i < line.length; i++) {
                const char = line[i];
                if (char === '"') {
                    inQuotes = !inQuotes;
                } else if (char === ',' && !inQuotes) {
                    result.push(current);
                    current = '';
                } else {
                    current += char;
                }
            }
            result.push(current);
            return result;
        }

        function cleanPrice(price) {
            if (!price || price.trim() === '' || price.trim() === '0') {
                return '-';
            }
            price = price.replace(/[^0-9\.\-]/g, '').trim();
            if (!price || price === '0' || price === '-0') {
                return '-';
            }
            return price;
        }

        function startEstimate() {
            if (phoneData.length === 0) {
                loadData().then(() => {
                    openModal();
                    showStep1();
                });
            } else {
                openModal();
                showStep1();
            }
        }

        function openModal() {
            document.getElementById('modal').classList.add('active');
            currentStep = 1;
            updateProgress();
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
            currentStep = 1;
            selectedBrand = '';
            selectedPhone = '';
            currentCarrier = '';
            targetCarrier = '';
        }

        function updateProgress() {
            const progress = (currentStep / 5) * 100;
            document.getElementById('progressBar').style.width = progress + '%';
        }

        function showStep1() {
            currentStep = 1;
            updateProgress();
            const modalBody = document.getElementById('modalBody');
            modalBody.innerHTML = `
                <h2 class="step-title">휴대폰을 선택해주세요</h2>
                <div class="option-grid">
                    <button class="option-btn" onclick="selectBrand('갤럭시')">📱 갤럭시</button>
                    <button class="option-btn" onclick="selectBrand('아이폰')">🍎 아이폰</button>
                    <button class="option-btn" onclick="selectBrand('키즈폰')">👶 키즈폰</button>
                    <button class="option-btn" onclick="selectBrand('효도폰')">👴 효도폰</button>
                </div>
            `;
        }

        function selectBrand(brand) {
            selectedBrand = brand;
            if (brand === '키즈폰' || brand === '효도폰') {
                alert('해당 카테고리는 준비중입니다.');
                return;
            }
            showStep2();
        }

        function showStep2() {
            currentStep = 2;
            updateProgress();
            
            let phones = phoneData.filter(phone => {
                if (selectedBrand === '갤럭시') {
                    return !phone.name.includes('아이폰');
                } else if (selectedBrand === '아이폰') {
                    return phone.name.includes('아이폰');
                }
                return false;
            });

            const modalBody = document.getElementById('modalBody');
            modalBody.innerHTML = `
                <h2 class="step-title">${selectedBrand} 기종 선택</h2>
                <div class="phone-list">
                    ${phones.map(phone => `
                        <div class="phone-item" onclick="selectPhone('${phone.name}')">
                            ${phone.name}
                        </div>
                    `).join('')}
                </div>
                <div class="action-buttons">
                    <button class="btn btn-back" onclick="showStep1()">이전</button>
                </div>
            `;
        }

        function selectPhone(phoneName) {
            selectedPhone = phoneName;
            document.querySelectorAll('.phone-item').forEach(item => {
                item.classList.remove('selected');
            });
            event.target.classList.add('selected');
            setTimeout(() => showStep3(), 300);
        }

        function showStep3() {
            currentStep = 3;
            updateProgress();
            const modalBody = document.getElementById('modalBody');
            modalBody.innerHTML = `
                <h2 class="step-title">현재 사용중인 통신사는?</h2>
                <div class="option-grid">
                    <button class="option-btn" onclick="selectCurrentCarrier('SKT')">SKT</button>
                    <button class="option-btn" onclick="selectCurrentCarrier('KT')">KT</button>
                    <button class="option-btn" onclick="selectCurrentCarrier('LG')">LG U+</button>
                    <button class="option-btn" onclick="selectCurrentCarrier('없음')">없음</button>
                </div>
                <div class="action-buttons" style="margin-top: 20px;">
                    <button class="btn btn-back" onclick="showStep2()">이전</button>
                </div>
            `;
        }

        function selectCurrentCarrier(carrier) {
            currentCarrier = carrier;
            showStep4();
        }

        function showStep4() {
            currentStep = 4;
            updateProgress();
            const modalBody = document.getElementById('modalBody');
            modalBody.innerHTML = `
                <h2 class="step-title">변경할 통신사를 선택해주세요</h2>
                <div class="option-grid">
                    <button class="option-btn" onclick="selectTargetCarrier('SKT')">
                        SKT ${currentCarrier === 'SKT' ? '<span class="carrier-badge">유지</span>' : ''}
                    </button>
                    <button class="option-btn" onclick="selectTargetCarrier('KT')">
                        KT ${currentCarrier === 'KT' ? '<span class="carrier-badge">유지</span>' : ''}
                    </button>
                    <button class="option-btn" onclick="selectTargetCarrier('LG')">
                        LG U+ ${currentCarrier === 'LG' ? '<span class="carrier-badge">유지</span>' : ''}
                    </button>
                </div>
                <div class="action-buttons" style="margin-top: 20px;">
                    <button class="btn btn-back" onclick="showStep3()">이전</button>
                </div>
            `;
        }

        function selectTargetCarrier(carrier) {
            targetCarrier = carrier;
            showResult();
        }

        function showResult() {
            currentStep = 5;
            updateProgress();
            
            const phone = phoneData.find(p => p.name === selectedPhone);
            if (!phone) {
                alert('데이터를 찾을 수 없습니다.');
                return;
            }

            let carrierData;
            let carrierName;
            if (targetCarrier === 'SKT') {
                carrierData = phone.skt;
                carrierName = 'SKT';
            } else if (targetCarrier === 'KT') {
                carrierData = phone.kt;
                carrierName = 'KT';
            } else if (targetCarrier === 'LG') {
                carrierData = phone.lg;
                carrierName = 'LG U+';
            }

            const isMove = (currentCarrier !== targetCarrier) && (currentCarrier !== '없음');
            const priceType = isMove ? 'move' : 'change';
            const typeText = isMove ? '번호이동' : '기기변경';
            
            const price = carrierData[priceType];
            const plan = planInfo[targetCarrier];

            const modalBody = document.getElementById('modalBody');
            modalBody.innerHTML = `
                <div class="result-container">
                    <h2 class="step-title">견적 결과</h2>
                    <div class="result-phone">${selectedPhone}</div>
                    
                    ${price !== '-' && price !== '0' ? `
                        <div class="best-price">
                            ${formatPriceToWon(price)}원
                        </div>
                    ` : '<div class="best-price" style="background: #95a5a6;">판매 중지</div>'}
                    
                    <div class="result-grid">
                        <div class="result-item">
                            <span class="result-label">통신사</span>
                            <span class="result-value">${carrierName}</span>
                        </div>
                        <div class="result-item">
                            <span class="result-label">유형</span>
                            <span class="result-value">${typeText}</span>
                        </div>
                        <div class="result-item">
                            <span class="result-label">${typeText}</span>
                            <span class="result-value">${price !== '-' && price !== '0' ? formatPriceToWon(price) + '원' : '판매중지'}</span>
                        </div>
                    </div>

                    ${price !== '-' && price !== '0' ? `
                        <div class="plan-info">
                            <strong>📋 요금제 정보</strong>
                            <p>${carrierName} ${plan.price} 요금제 (${plan.duration} 유지)</p>
                        </div>
                    ` : ''}
                    
                    <div class="action-buttons" style="margin-top: 20px;">
                        <button class="btn btn-back" onclick="showStep1()">다시 계산하기</button>
                        <button class="btn btn-next" onclick="closeModal()">닫기</button>
                    </div>
                </div>
            `;
        }

        // 만원 단위를 원 단위로 변환 (64.3 -> 643,000)
        function formatPriceToWon(price) {
            if (typeof price === 'string') {
                price = parseFloat(price);
            }
            if (isNaN(price)) return '0';
            
            // 만원 단위를 원 단위로 변환
            const wonPrice = Math.round(price * 10000);
            return wonPrice.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
        }

        window.addEventListener('DOMContentLoaded', loadData);
    </script>
</body>
</html>
