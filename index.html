<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>힙폰 - 오늘의 휴대폰 시세</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Apple SD Gothic Neo', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .main-container {
            text-align: center;
            padding: 40px 20px;
        }
        
        .logo {
            font-size: 3.5em;
            font-weight: 700;
            color: #fff;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        
        .subtitle {
            font-size: 1.4em;
            color: rgba(255,255,255,0.9);
            margin-bottom: 50px;
        }
        
        .estimate-btn {
            background: #fff;
            color: #667eea;
            border: none;
            padding: 18px 60px;
            font-size: 1.2em;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            font-weight: 600;
        }
        
        .estimate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: #fff;
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            position: relative;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }
        
        .close-modal {
            position: absolute;
            top: 20px;
            right: 25px;
            font-size: 32px;
            cursor: pointer;
            color: #95a5a6;
            line-height: 1;
        }
        
        .close-modal:hover {
            color: #2c3e50;
        }
        
        .progress-bar {
            width: 100%;
            height: 6px;
            background: #ecf0f1;
            border-radius: 3px;
            margin-bottom: 30px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transition: width 0.3s;
        }
        
        .step-title {
            font-size: 1.5em;
            color: #2c3e50;
            margin-bottom: 25px;
            font-weight: 600;
        }
        
        .option-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .option-btn {
            background: #f8f9fa;
            border: 2px solid #e9ecef;
            padding: 20px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1.1em;
            color: #495057;
            font-weight: 500;
        }
        
        .option-btn.selected,
        .option-btn:hover {
            background: #e8f4f8;
            border-color: #667eea;
            color: #667eea;
        }
        
        .option-btn.selected {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            border-color: #667eea;
        }
        
        .phone-list {
            max-height: 400px;
            overflow-y: auto;
            margin-bottom: 20px;
        }
        
        .phone-item {
            background: #f8f9fa;
            border: 2px solid #e9ecef;
            padding: 15px 20px;
            border-radius: 10px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .phone-item.selected,
        .phone-item:hover {
            background: #e8f4f8;
            border-color: #667eea;
        }
        
        .phone-item.selected {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            border-color: #667eea;
        }
        
        .btn-group {
            display: flex;
            gap: 10px;
        }
        
        .btn {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
        }
        
        .btn-back {
            background: #95a5a6;
            color: #fff;
        }
        
        .btn-back:hover {
            background: #7f8c8d;
        }
        
        .btn-next {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
        }
        
        .btn-next:hover {
            opacity: 0.9;
        }
        
        .btn-next:disabled {
            background: #bdc3c7;
            cursor: not-allowed;
            opacity: 0.6;
        }
        
        .best-price {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            padding: 25px;
            border-radius: 12px;
            font-size: 1.6em;
            font-weight: 700;
            margin: 20px 0;
            text-align: center;
        }
        
        .result-grid {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .result-item {
            display: flex;
            justify-content: space-between;
            padding: 14px 0;
            border-bottom: 1px solid #e9ecef;
        }
        
        .result-item:last-child {
            border-bottom: none;
        }
        
        .result-label {
            color: #6c757d;
            font-weight: 500;
            font-size: 1em;
        }
        
        .result-value {
            color: #2c3e50;
            font-weight: 600;
            font-size: 1.1em;
            text-align: right;
        }
        
        .result-value.highlight {
            color: #667eea;
            font-size: 1.3em;
        }
        
        .result-value.strikethrough {
            text-decoration: line-through;
            color: #95a5a6;
            font-size: 0.95em;
        }
        
        .carrier-badge {
            background: #e8f4f8;
            color: #667eea;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.85em;
            margin-left: 8px;
        }
        
        @media (max-width: 768px) {
            .logo {
                font-size: 2.5em;
            }
            
            .subtitle {
                font-size: 1.1em;
            }
            
            .option-grid {
                grid-template-columns: 1fr;
            }
            
            .modal-content {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="main-container">
        <h1 class="logo">힙폰</h1>
        <p class="subtitle">오늘의 휴대폰 시세</p>
        <button class="estimate-btn" onclick="startEstimate()">견적 확인하기</button>
    </div>

    <div class="modal" id="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <div class="progress-bar">
                <div class="progress-fill" id="progressBar"></div>
            </div>
            <div id="modalBody"></div>
        </div>
    </div>

    <script>
        const SHEET_ID = '1kncTOT0Owvplo-ee6BD-BbUwYU5AC4YDbQ-iY6Wv5Zc';
        const GID = '647819140';
        
        let phoneData = [];
        let currentStep = 1;
        let selectedBrand = '';
        let selectedPhone = '';
        let currentCarrier = '';
        let targetCarrier = '';
        
        const planInfo = {
            'skt': { name: 'SKT 109,000원 요금제', duration: '6개월 유지' },
            'kt': { name: 'KT 110,000원 요금제', duration: '6개월 유지' },
            'lg': { name: 'LG 115,000원 요금제', duration: '6개월 유지' }
        };
        
        const additionalServices = {
            'skt': { name: '우주패스', price: '9,900원' },
            'kt': { name: '필수팩 지니/밀리', price: '9,900원' },
            'lg': { name: 'V컬러링 음악감상', price: '8,800원' }
        };

        async function loadData() {
            try {
                const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${GID}`;
                const response = await fetch(url);
                const csvText = await response.text();
                parseCSVData(csvText);
                console.log('데이터 로드 완료:', phoneData.length + '개');
                if (phoneData.length > 0) {
                    console.log('첫 번째 데이터:', phoneData[0]);
                }
            } catch (error) {
                console.error('데이터 로딩 실패:', error);
            }
        }

        function parseCSVData(csv) {
            const lines = csv.split('\n');
            phoneData = [];
            
            // 9번째 줄부터 시작 (인덱스 8부터)
            for (let i = 8; i < 45; i++) {
                const cols = parseCSVLine(lines[i]);
                const name = cols[1]?.trim();
                const retail = cols[2]?.trim();
                
                // 빈 행이나 날짜 형식 제외
                if (!name || name === '모델명' || name === '' || /^\d{4}-\d{1,2}-\d{1,2}$/.test(name)) {
                    continue;
                }
                
                phoneData.push({
                    name: name,
                    retail: retail,
                    skt: {
                        move: cleanPrice(cols[5]),    // F열: SKT 이동
                        change: cleanPrice(cols[6])    // G열: SKT 기변
                    },
                    kt: {
                        move: cleanPrice(cols[11]),   // L열: KT 이동
                        change: cleanPrice(cols[12])   // M열: KT 기변
                    },
                    lg: {
                        move: cleanPrice(cols[15]),   // P열: LG 이동
                        change: cleanPrice(cols[16])   // Q열: LG 기변
                    }
                });
            }
        }

        function parseCSVLine(line) {
            const result = [];
            let current = '';
            let inQuotes = false;
            
            for (let char of line) {
                if (char === '"') {
                    inQuotes = !inQuotes;
                } else if (char === ',' && !inQuotes) {
                    result.push(current);
                    current = '';
                } else {
                    current += char;
                }
            }
            result.push(current);
            return result;
        }

        function cleanPrice(price) {
            if (!price || price.trim() === '' || price.trim() === '0') {
                return '-';
            }
            const cleaned = price.replace(/[^0-9\-]/g, '').trim();
            return cleaned || '-';
        }

        function startEstimate() {
            if (phoneData.length === 0) {
                loadData().then(() => {
                    openModal();
                    showStep1();
                });
            } else {
                openModal();
                showStep1();
            }
        }

        function openModal() {
            document.getElementById('modal').classList.add('active');
            currentStep = 1;
            updateProgress();
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
            resetState();
        }

        function resetState() {
            currentStep = 1;
            selectedBrand = '';
            selectedPhone = '';
            currentCarrier = '';
            targetCarrier = '';
        }

        function updateProgress() {
            document.getElementById('progressBar').style.width = (currentStep / 5 * 100) + '%';
        }

        function showStep1() {
            currentStep = 1;
            updateProgress();
            
            const modalBody = document.getElementById('modalBody');
            modalBody.innerHTML = `
                <div class="step-title">📱 휴대폰 브랜드를 선택해주세요</div>
                <div class="option-grid">
                    <div class="option-btn" onclick="selectBrand('갤럭시')">갤럭시</div>
                    <div class="option-btn" onclick="selectBrand('아이폰')">아이폰</div>
                    <div class="option-btn" onclick="selectBrand('키즈폰')">키즈폰</div>
                    <div class="option-btn" onclick="selectBrand('효도폰')">효도폰</div>
                </div>
            `;
        }

        function selectBrand(brand) {
            if (brand === '키즈폰' || brand === '효도폰') {
                alert('준비 중입니다.');
                return;
            }
            
            selectedBrand = brand;
            showStep2();
        }

        function showStep2() {
            currentStep = 2;
            updateProgress();
            
            let filteredPhones = [];
            
            if (selectedBrand === '갤럭시') {
                filteredPhones = phoneData.filter(phone => !phone.name.includes('아이폰'));
            } else if (selectedBrand === '아이폰') {
                filteredPhones = phoneData.filter(phone => phone.name.includes('아이폰'));
            }
            
            const modalBody = document.getElementById('modalBody');
            modalBody.innerHTML = `
                <div class="step-title">📱 기종을 선택해주세요</div>
                <div class="phone-list">
                    ${filteredPhones.map(phone => `
                        <div class="phone-item" onclick="selectPhone('${phone.name}')">${phone.name}</div>
                    `).join('')}
                </div>
                <div class="btn-group">
                    <button class="btn btn-back" onclick="showStep1()">이전</button>
                </div>
            `;
        }

        function selectPhone(phoneName) {
            selectedPhone = phoneName;
            showStep3();
        }

        function showStep3() {
            currentStep = 3;
            updateProgress();
            
            const modalBody = document.getElementById('modalBody');
            modalBody.innerHTML = `
                <div class="step-title">📡 현재 사용 중인 통신사를 선택해주세요</div>
                <div class="option-grid">
                    <div class="option-btn" onclick="selectCurrentCarrier('skt')">SKT</div>
                    <div class="option-btn" onclick="selectCurrentCarrier('kt')">KT</div>
                    <div class="option-btn" onclick="selectCurrentCarrier('lg')">LG U+</div>
                    <div class="option-btn" onclick="selectCurrentCarrier('other')">알뜰폰</div>
                </div>
                <div class="btn-group">
                    <button class="btn btn-back" onclick="showStep2()">이전</button>
                </div>
            `;
        }

        function selectCurrentCarrier(carrier) {
            currentCarrier = carrier;
            showStep4();
        }

        function showStep4() {
            currentStep = 4;
            updateProgress();
            
            const modalBody = document.getElementById('modalBody');
            modalBody.innerHTML = `
                <div class="step-title">📡 원하는 통신사를 선택해주세요</div>
                <div class="option-grid">
                    <div class="option-btn" onclick="selectTargetCarrier('skt')">
                        SKT ${currentCarrier === 'skt' ? '<span class="carrier-badge">유지</span>' : ''}
                    </div>
                    <div class="option-btn" onclick="selectTargetCarrier('kt')">
                        KT ${currentCarrier === 'kt' ? '<span class="carrier-badge">유지</span>' : ''}
                    </div>
                    <div class="option-btn" onclick="selectTargetCarrier('lg')">
                        LG U+ ${currentCarrier === 'lg' ? '<span class="carrier-badge">유지</span>' : ''}
                    </div>
                </div>
                <div class="btn-group">
                    <button class="btn btn-back" onclick="showStep3()">이전</button>
                </div>
            `;
        }

        function selectTargetCarrier(carrier) {
            targetCarrier = carrier;
            showResult();
        }

        function showResult() {
            currentStep = 5;
            updateProgress();
            
            const phone = phoneData.find(p => p.name === selectedPhone);
            if (!phone) return;
            
            const isMove = currentCarrier !== targetCarrier;
            const priceType = isMove ? 'move' : 'change';
            const price = phone[targetCarrier][priceType];
            const formattedPrice = formatPrice(price);
            const retailPrice = formatRetailPrice(phone.retail);
            
            const plan = planInfo[targetCarrier];
            const service = additionalServices[targetCarrier];
            
            const modalBody = document.getElementById('modalBody');
            modalBody.innerHTML = `
                <div class="step-title">✅ 견적 결과</div>
                <div class="best-price">${formattedPrice}</div>
                <div class="result-grid">
                    <div class="result-item">
                        <span class="result-label">모델명</span>
                        <span class="result-value">${phone.name}</span>
                    </div>
                    <div class="result-item">
                        <span class="result-label">기존 가격</span>
                        <span class="result-value strikethrough">${retailPrice}</span>
                    </div>
                    <div class="result-item">
                        <span class="result-label">견적 가격</span>
                        <span class="result-value highlight">${formattedPrice}</span>
                    </div>
                    <div class="result-item">
                        <span class="result-label">통신사</span>
                        <span class="result-value">${targetCarrier.toUpperCase()}</span>
                    </div>
                    <div class="result-item">
                        <span class="result-label">유형</span>
                        <span class="result-value">${isMove ? '번호이동' : '기기변경'}</span>
                    </div>
                    <div class="result-item">
                        <span class="result-label">${isMove ? '번호이동 가격' : '기기변경 가격'}</span>
                        <span class="result-value">${formattedPrice}</span>
                    </div>
                    <div class="result-item">
                        <span class="result-label">요금제</span>
                        <span class="result-value">${plan.name}<br><small>(${plan.duration})</small></span>
                    </div>
                    <div class="result-item">
                        <span class="result-label">부가 서비스</span>
                        <span class="result-value">${service.name}<br><small>(${service.price})</small></span>
                    </div>
                </div>
                <div class="btn-group">
                    <button class="btn btn-back" onclick="startEstimate()">다시 계산하기</button>
                    <button class="btn btn-next" onclick="closeModal()">닫기</button>
                </div>
            `;
        }

        function formatPrice(price) {
            if (price === '-' || !price || price === '0') {
                return '판매중지';
            }
            
            const cleanedPrice = price.replace(/[^0-9]/g, '');
            if (!cleanedPrice || cleanedPrice === '0') {
                return '판매중지';
            }
            
            return cleanedPrice.replace(/\B(?=(\d{3})+(?!\d))/g, ',') + '원';
        }

        function formatRetailPrice(price) {
            if (!price) return '-';
            const cleanedPrice = price.replace(/[^0-9]/g, '');
            return cleanedPrice ? cleanedPrice.replace(/\B(?=(\d{3})+(?!\d))/g, ',') + '원' : '-';
        }

        window.addEventListener('DOMContentLoaded', loadData);
    </script>
        window.addEventListener('DOMContentLoaded', loadData);
        
        // 1시간마다 자동 데이터 갱신
        setInterval(() => {
            console.log('🔄 데이터 자동 갱신 중... (' + new Date().toLocaleTimeString() + ')');
            loadData();
        }, 3600000); // 3600000ms = 1시간
    </script>
</body>
</html>
